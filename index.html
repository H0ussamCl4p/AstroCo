                if(targets.length === 0) return;
                
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, threeCamera);
                
                // Reset scale and opacity
                targets.forEach(t => { 
                    t.scale.set(1, 1, 1); 
                    if (t.material) t.material.opacity = 0.85; 
                });
                
                const intersects = raycaster.intersectObjects(targets);
                if(intersects.length > 0) {
                    const obj = intersects[0].object;
                    // Pop animation/glow highlight
                    obj.scale.set(1.1, 1.1, 1.1);
                    if (obj.material) obj.material.opacity = 1.0;
                    document.body.style.cursor = 'pointer';
                } else {
                    document.body.style.cursor = 'default';
                }
            });

            window.addEventListener('click', (e) => {
                const targets = getVisibleMenuChildren();
                if(targets.length === 0) return;
                // Ignore click if it's over the start Overlay or VR button
                if(e.target.id === 'startBtn') return;
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, threeCamera);
                
                const intersects = raycaster.intersectObjects(targets);
                if(intersects.length > 0) {
                    const id = intersects[0].object.userData.id;
                    if (window.handleMenuSelection) window.handleMenuSelection(id);
                }
            });

            // VR Controllers raycasting
            const controller1 = threeRenderer.xr.getController(0);
            const controller2 = threeRenderer.xr.getController(1);
            
            const buildController = (controller) => {
                threeScene.add(controller);
                const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-2)]);
                const line = new THREE.Line(geo, new THREE.LineBasicMaterial({color: 0xffffff}));
                line.name = "line";
                controller.add(line);
                
                controller.addEventListener('select', () => {
                    const targets = getVisibleMenuChildren();
                    if(targets.length === 0) return;
                    
                    const mat = new THREE.Matrix4().identity().extractRotation(controller.matrixWorld);
                    const rayc = new THREE.Raycaster();
                    rayc.ray.origin.setFromMatrixPosition(controller.matrixWorld);
                    rayc.ray.direction.set(0,0,-1).applyMatrix4(mat);
                    
                    const intersects = rayc.intersectObjects(targets);
                    if(intersects.length > 0) {
                        const id = intersects[0].object.userData.id;
                        if (window.handleMenuSelection) window.handleMenuSelection(id);
                    }
                });
            };
            buildController(controller1);
            buildController(controller2);

            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            const gltf = await loader.loadAsync(modelUrl);
            VRMUtils.removeUnnecessaryVertices(gltf.scene);
            VRMUtils.removeUnnecessaryJoints(gltf.scene);

            vrm = gltf.userData.vrm;
            if (!vrm) {
                throw new Error('VRM loader did not produce a vrm instance');
            }

            // VRM0 avatars usually face -Z; rotate so it faces the camera
            try { VRMUtils.rotateVRM0(vrm); } catch {}

            // Apply a nicer base pose (avoid T-pose)
            applyVrmRelaxedPose();

            // Place VRM in the scene
            threeScene.add(vrm.scene);
            document.getElementById('loading').style.display = 'none';

            // Fit camera using the VRM scene bounds
            fitGlbToView(vrm.scene, threeCamera);

            // Orbit controls so you can rotate around
            window.controls = new OrbitControls(threeCamera, threeRenderer.domElement);
            window.controls.target.set(0, 0.8, 0); // Focus on avatar's upper body
            window.controls.enableDamping = true;
            window.controls.dampingFactor = 0.05;
            window.controls.enablePan = false; // Prevents "character disappearing" on middle-click
            window.controls.minDistance = 0.5; // Prevent zooming inside
            window.controls.maxDistance = 6.0; // Prevent zooming too far out

            // Cache base rotations so we animate as offsets
            vrmBaseRotations = {};
            const boneKeys = [
                VRMHumanBoneName.Hips,
                VRMHumanBoneName.Spine,
                VRMHumanBoneName.Chest,
                VRMHumanBoneName.Neck,
                VRMHumanBoneName.Head,
                VRMHumanBoneName.LeftUpperArm,
                VRMHumanBoneName.RightUpperArm,
                VRMHumanBoneName.LeftLowerArm,
                VRMHumanBoneName.RightLowerArm,
                VRMHumanBoneName.LeftHand,
                VRMHumanBoneName.RightHand,
                VRMHumanBoneName.LeftUpperLeg,
                VRMHumanBoneName.RightUpperLeg,
            ];
            for (const k of boneKeys) {
                const b = getVrmBone(k);
                if (b) {
                    vrmBaseRotations[k] = { x: b.rotation.x, y: b.rotation.y, z: b.rotation.z };
                }
            }

            // Mouth control (three-vrm v2): expressions (VRM0/VRM1 are unified as "expressionManager")
            vrmMouthMode = (vrm.expressionManager && typeof vrm.expressionManager.setValue === 'function') ? 'expression' : null;
            paramEl.textContent = vrmMouthMode ? 'vrm:expression:aa' : '(no mouth controller)';

            // Rig + material debug
            const info = {
                meshes: 0,
                skinned: 0,
                bones: 0,
                morphs: 0,
            };
            let materialCount = 0;
            let materialWithMapCount = 0;
            let mtoonCount = 0;
            vrm.scene.traverse((obj) => {
                if (obj.isBone) info.bones++;
                if (obj.isMesh) {
                    info.meshes++;
                    if (obj.isSkinnedMesh) info.skinned++;
                    if (obj.morphTargetDictionary) info.morphs += Object.keys(obj.morphTargetDictionary).length;

                    const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
                    for (const mat of mats) {
                        if (!mat) continue;
                        materialCount++;
                        if (mat.map) materialWithMapCount++;
                        if (mat.type === 'MToonMaterial') mtoonCount++;
                    }
                }
            });
            rigEl.textContent = `VRM0 meshes=${info.meshes}, skinned=${info.skinned}, bones=${info.bones}, morphs=${info.morphs}, mats=${materialCount}, maps=${materialWithMapCount}, mtoon=${mtoonCount}`;

            const onResize = () => {
                threeRenderer.setSize(window.innerWidth, window.innerHeight, false);
                threeCamera.aspect = window.innerWidth / window.innerHeight;
                threeCamera.updateProjectionMatrix();
                if (vrm && vrm.scene) {
                    fitGlbToView(vrm.scene, threeCamera);
                }
            };
            window.addEventListener('resize', onResize);

            const animate = () => {

                // Smooth speech level (fast up, slower down)
                const vRaw = mouthValue;
                if (vRaw > speechLevel) {
                    speechLevel = speechLevel * 0.75 + vRaw * 0.25;
                } else {
                    speechLevel = speechLevel * 0.88 + vRaw * 0.12;
                }
                speechEl.textContent = speechLevel.toFixed(3);

                const t = performance.now() * 0.001;
                const s = Math.max(0, Math.min(1, speechLevel));
                const wave = Math.sin(t * 6.0);
                const waveSlow = Math.sin(t * 2.0);

                // Mouth (VRM expressions)
                if (vrmMouthMode === 'expression') {
                    try {
                        // VRM0/VRM1 use the same preset names here (aa/ih/ou/ee/oh)
                        vrm.expressionManager.setValue(VRMExpressionPresetName.Aa, s);
                    } catch {}
                }

                // Optional facial expression overlay (happy/sad/etc)
                if (vrmMouthMode === 'expression' && activeExpression) {
                    const nowS = performance.now() * 0.001;
                    const u = (nowS - activeExpression.startS) / Math.max(0.001, activeExpression.durationS);
                    if (u >= 1.0) {
                        // fade out
                        activeExpression = null;
                    } else {
                        // bell-ish envelope
                        const env = Math.sin(Math.min(1.0, u) * Math.PI);
                        const v = Math.max(0, Math.min(1, activeExpression.value * env));

                        const preset = {
                            happy: VRMExpressionPresetName.Happy,
                            sad: VRMExpressionPresetName.Sad,
                            angry: VRMExpressionPresetName.Angry,
                            relaxed: VRMExpressionPresetName.Relaxed,
                            surprised: VRMExpressionPresetName.Surprised,
                        }[activeExpression.name];

                        try {
                            if (preset) vrm.expressionManager.setValue(preset, v);
                        } catch {}
                    }
                }

                // --- Human Motion Physics Engine ---
                // Goal: "human" movement without mocap by combining:
                // - mean-reverting random targets (Ornstein-Uhlenbeck)
                // - physically-plausible 2nd-order dynamics (mass-spring-damper)
                // - joint limits to avoid broken poses
                if (!window.humanMotion) {
                    window.humanMotion = {
                        targets: {},
                        states: {},
                        _spare: null,
                        randn() {
                            if (this._spare != null) {
                                const v = this._spare;
                                this._spare = null;
                                return v;
                            }
                            let u = 0;
                            let v = 0;
                            while (u === 0) u = Math.random();
                            while (v === 0) v = Math.random();
                            const mag = Math.sqrt(-2.0 * Math.log(u));
                            const z0 = mag * Math.cos(2.0 * Math.PI * v);
                            const z1 = mag * Math.sin(2.0 * Math.PI * v);
                            this._spare = z1;
                            return z0;
                        },
                    };
                }
                const HM = window.humanMotion;

                // One delta used for BOTH physics and vrm.update()
                const dt = Math.min(0.05, Math.max(0.001, clock.getDelta()));

                // Tuning knobs (adjust these first)
                const PHYS = {
                    hips: {
                        fHz: 0.8,
                        zeta: 0.95,
                        ouTheta: 0.8,
                        ouSigma: { x: 0.010, y: 0.015, z: 0.010 },
                        limits: { x: [-0.05, 0.05], y: [-0.10, 0.10], z: [-0.05, 0.05] },
                    },
                    leg: {
                        fHz: 0.9,
                        zeta: 0.98,
                        ouTheta: 1.0,
                        ouSigma: { x: 0.005, y: 0.005, z: 0.005 },
                        limits: { x: [-0.05, 0.05], y: [-0.05, 0.05], z: [-0.05, 0.05] },
                    },
                    torso: {
                        fHz: 1.1,
                        zeta: 0.85,
                        ouTheta: 0.9,
                        ouSigma: { x: 0.035, y: 0.030, z: 0.025 },
                        limits: { x: [-0.18, 0.18], y: [-0.30, 0.30], z: [-0.10, 0.10] },
                    },
                    head: {
                        fHz: 1.8,
                        zeta: 0.80,
                        ouTheta: 1.2,
                        ouSigma: { x: 0.055, y: 0.050, z: 0.030 },
                        limits: { x: [-0.35, 0.35], y: [-0.55, 0.55], z: [-0.25, 0.25] },
                    },
                    upperArm: {
                        fHz: 0.95,
                        zeta: 0.98,
                        ouTheta: 1.3,
                        ouSigma: { x: 0.006, y: 0.006, z: 0.004 },
                        limits: { x: [-0.55, 0.22], y: [-0.28, 0.28], z: [-0.25, 0.25] },
                    },
                    lowerArm: {
                        fHz: 1.10,
                        zeta: 0.95,
                        ouTheta: 1.3,
                        ouSigma: { x: 0.008, y: 0.008, z: 0.008 },
                        limits: { x: [-0.90, 0.45], y: [-0.50, 0.50], z: [-0.50, 0.50] },
                    },
                };

                const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
                const ouStep = (x, theta, sigma) => {
                    // mean-reverting around 0
                    return x + (-theta * x) * dt + (sigma * Math.sqrt(dt) * HM.randn());
                };
                const ensure = (key, base) => {
                    if (!HM.targets[key]) HM.targets[key] = { ox: 0, oy: 0, oz: 0 };
                    if (!HM.states[key]) HM.states[key] = { x: base.x, y: base.y, z: base.z, vx: 0, vy: 0, vz: 0 };
                };
                const stepSecondOrder = (state, target, fHz, zeta) => {
                    // y'' + 2*zeta*w*y' + w^2*y = w^2*x
                    const w = 2.0 * Math.PI * fHz;
                    const k = w * w;
                    const c = 2.0 * zeta * w;

                    state.vx += (k * (target.x - state.x) - c * state.vx) * dt;
                    state.vy += (k * (target.y - state.y) - c * state.vy) * dt;
                    state.vz += (k * (target.z - state.z) - c * state.vz) * dt;

                    state.x += state.vx * dt;
                    state.y += state.vy * dt;
                    state.z += state.vz * dt;
                };

                const driveBone = (boneEnum, fallbackEnum, opts) => {
                    const bone = getVrmBone(boneEnum) || (fallbackEnum ? getVrmBone(fallbackEnum) : null);
                    if (!bone || !vrmBaseRotations) return;

                    const key = bone === getVrmBone(boneEnum) ? boneEnum : fallbackEnum;
                    if (!key || !vrmBaseRotations[key]) return;
                    const base = vrmBaseRotations[key];
                    ensure(key, base);

                    const tgt = HM.targets[key];
                    const st = HM.states[key];

                    // OU target offsets (slow wandering)
                    tgt.ox = ouStep(tgt.ox, opts.ouTheta, opts.ouSigmaX);
                    tgt.oy = ouStep(tgt.oy, opts.ouTheta, opts.ouSigmaY);
                    tgt.oz = ouStep(tgt.oz, opts.ouTheta, opts.ouSigmaZ);

                    const target = {
                        x: base.x + opts.baseOffset.x + tgt.ox,
                        y: base.y + opts.baseOffset.y + tgt.oy,
                        z: base.z + opts.baseOffset.z + tgt.oz,
                    };

                    // 2nd-order dynamics for weight / inertia
                    stepSecondOrder(st, target, opts.fHz, opts.zeta);

                    // Joint limits around base
                    if (opts.limits) {
                        st.x = base.x + clamp(st.x - base.x, opts.limits.x[0], opts.limits.x[1]);
                        st.y = base.y + clamp(st.y - base.y, opts.limits.y[0], opts.limits.y[1]);
                        st.z = base.z + clamp(st.z - base.z, opts.limits.z[0], opts.limits.z[1]);
                    }

                    bone.rotation.x = st.x;
                    bone.rotation.y = st.y;
                    bone.rotation.z = st.z;
                };

                if (!window.isGesturing) {
                    // Independent idle movement even when silent
                    const talk = s;
                    const breathe = 0.012 + 0.010 * (0.5 + 0.5 * Math.sin(t * 1.2));
                    const micro = 0.008;

                    // Hips: very slow waifu-like swaying
                    driveBone(VRMHumanBoneName.Hips, null, {
                        baseOffset: {
                            x: (0.015 * Math.sin(t * 0.8)),
                            y: (0.010 * Math.sin(t * 0.6)),
                            z: (0.005 * Math.sin(t * 1.0)),
                        },
                        fHz: PHYS.hips.fHz, zeta: PHYS.hips.zeta,
                        ouTheta: PHYS.hips.ouTheta, ouSigmaX: PHYS.hips.ouSigma.x, ouSigmaY: PHYS.hips.ouSigma.y, ouSigmaZ: PHYS.hips.ouSigma.z,
                        limits: PHYS.hips.limits,
                    });

                    // Legs: slight outward rotation/shifting weight
                    driveBone(VRMHumanBoneName.LeftUpperLeg, null, {
                        baseOffset: { x: 0, y: 0, z: (0.015 * Math.sin(t * 0.7)) },
                        fHz: PHYS.leg.fHz, zeta: PHYS.leg.zeta,
                        ouTheta: PHYS.leg.ouTheta, ouSigmaX: PHYS.leg.ouSigma.x, ouSigmaY: PHYS.leg.ouSigma.y, ouSigmaZ: PHYS.leg.ouSigma.z,
                        limits: PHYS.leg.limits,
                    });
                    driveBone(VRMHumanBoneName.RightUpperLeg, null, {
                        baseOffset: { x: 0, y: 0, z: -(0.015 * Math.sin(t * 0.7)) },
                        fHz: PHYS.leg.fHz, zeta: PHYS.leg.zeta,
                        ouTheta: PHYS.leg.ouTheta, ouSigmaX: PHYS.leg.ouSigma.x, ouSigmaY: PHYS.leg.ouSigma.y, ouSigmaZ: PHYS.leg.ouSigma.z,
                        limits: PHYS.leg.limits,
                    });

                    // Torso: slow weight shifts + breathing
                    driveBone(VRMHumanBoneName.Chest, VRMHumanBoneName.Spine, {
                        baseOffset: {
                            x: (breathe * Math.sin(t * 1.3)) + (0.04 * talk * Math.sin(t * 3.1)),
                            y: (micro * Math.sin(t * 0.9)) + (0.03 * talk * Math.sin(t * 2.4)),
                            z: (micro * Math.sin(t * 0.7)),
                        },
                        fHz: PHYS.torso.fHz,
                        zeta: PHYS.torso.zeta,
                        ouTheta: PHYS.torso.ouTheta,
                        ouSigmaX: PHYS.torso.ouSigma.x,
                        ouSigmaY: PHYS.torso.ouSigma.y,
                        ouSigmaZ: PHYS.torso.ouSigma.z,
                        limits: PHYS.torso.limits,
                    });

                    // Head: follows more, slightly snappier
                    driveBone(VRMHumanBoneName.Head, VRMHumanBoneName.Neck, {
                        baseOffset: {
                            x: (micro * Math.sin(t * 1.6)) + (0.05 * talk * Math.sin(t * 2.9)),
                            y: (micro * Math.sin(t * 1.1)) + (0.04 * talk * Math.sin(t * 3.3)),
                            z: (micro * Math.sin(t * 0.8)),
                        },
                        fHz: PHYS.head.fHz,
                        zeta: PHYS.head.zeta,
                        ouTheta: PHYS.head.ouTheta,
                        ouSigmaX: PHYS.head.ouSigma.x,
                        ouSigmaY: PHYS.head.ouSigma.y,
                        ouSigmaZ: PHYS.head.ouSigma.z,
                        limits: PHYS.head.limits,
                    });

                    // Arms: keep them relaxed; avoid "V" flare by tightening z-range (abduction)
                    driveBone(VRMHumanBoneName.LeftUpperArm, null, {
                        baseOffset: {
                            x: (-0.08 * talk) + (micro * Math.sin(t * 0.75)),
                            y: (0.020 * Math.sin(t * 0.70 + 0.7)) + (0.030 * talk * Math.sin(t * 1.7 + 0.3)),
                            z: (0.010 * talk * Math.sin(t * 1.9)) + (0.006 * Math.sin(t * 0.95)),
                        },
                        fHz: PHYS.upperArm.fHz,
                        zeta: PHYS.upperArm.zeta,
                        ouTheta: PHYS.upperArm.ouTheta,
                        ouSigmaX: PHYS.upperArm.ouSigma.x,
                        ouSigmaY: PHYS.upperArm.ouSigma.y,
                        ouSigmaZ: PHYS.upperArm.ouSigma.z,
                        limits: PHYS.upperArm.limits,
                    });
                    driveBone(VRMHumanBoneName.RightUpperArm, null, {
                        baseOffset: {
                            x: (-0.08 * talk) + (micro * Math.sin(t * 0.80)),
                            y: (-0.020 * Math.sin(t * 0.70 + 0.7)) + (-0.030 * talk * Math.sin(t * 1.7 + 0.3)),
                            z: -(0.010 * talk * Math.sin(t * 1.9)) + (-0.006 * Math.sin(t * 0.95)),
                        },
                        fHz: PHYS.upperArm.fHz,
                        zeta: PHYS.upperArm.zeta,
                        ouTheta: PHYS.upperArm.ouTheta,
                        ouSigmaX: PHYS.upperArm.ouSigma.x,
                        ouSigmaY: PHYS.upperArm.ouSigma.y,
                        ouSigmaZ: PHYS.upperArm.ouSigma.z,
                        limits: PHYS.upperArm.limits,
                    });

                    driveBone(VRMHumanBoneName.LeftLowerArm, null, {
                        baseOffset: {
                            x: (-0.12 * talk * (0.6 + 0.4 * Math.sin(t * 4.2))),
                            y: (0.018 * Math.sin(t * 0.95 + 1.2)) + (0.025 * talk * Math.sin(t * 3.0 + 0.9)),
                            z: (0.010 * Math.sin(t * 0.85 + 0.2)),
                        },
                        fHz: PHYS.lowerArm.fHz,
                        zeta: PHYS.lowerArm.zeta,
                        ouTheta: PHYS.lowerArm.ouTheta,
                        ouSigmaX: PHYS.lowerArm.ouSigma.x,
                        ouSigmaY: PHYS.lowerArm.ouSigma.y,
                        ouSigmaZ: PHYS.lowerArm.ouSigma.z,
                        limits: PHYS.lowerArm.limits,
                    });
                    driveBone(VRMHumanBoneName.RightLowerArm, null, {
                        baseOffset: {
                            x: (-0.12 * talk * (0.6 + 0.4 * Math.sin(t * 4.2))),
                            y: (-0.018 * Math.sin(t * 0.95 + 1.2)) + (-0.025 * talk * Math.sin(t * 3.0 + 0.9)),
                            z: (-0.010 * Math.sin(t * 0.85 + 0.2)),
                        },
                        fHz: PHYS.lowerArm.fHz,
                        zeta: PHYS.lowerArm.zeta,
                        ouTheta: PHYS.lowerArm.ouTheta,
                        ouSigmaX: PHYS.lowerArm.ouSigma.x,
                        ouSigmaY: PHYS.lowerArm.ouSigma.y,
                        ouSigmaZ: PHYS.lowerArm.ouSigma.z,
                        limits: PHYS.lowerArm.limits,
                    });
                } else {
                    // While GSAP is animating, keep physics state in sync to prevent snapping
                    const syncKeys = [
                        VRMHumanBoneName.Hips,
                        VRMHumanBoneName.Chest, VRMHumanBoneName.Spine,
                        VRMHumanBoneName.Head, VRMHumanBoneName.Neck,
                        VRMHumanBoneName.LeftUpperArm, VRMHumanBoneName.RightUpperArm,
                        VRMHumanBoneName.LeftLowerArm, VRMHumanBoneName.RightLowerArm,
                        VRMHumanBoneName.LeftHand, VRMHumanBoneName.RightHand,
                        VRMHumanBoneName.LeftUpperLeg, VRMHumanBoneName.RightUpperLeg
                    ];
                    syncKeys.forEach(k => {
                        const b = getVrmBone(k);
                        if (!b || !vrmBaseRotations || !vrmBaseRotations[k]) return;
                        const base = vrmBaseRotations[k];
                        ensure(k, base);
                        const st = HM.states[k];
                        st.x = b.rotation.x;
                        st.y = b.rotation.y;
                        st.z = b.rotation.z;
                        st.vx = 0;
                        st.vy = 0;
                        st.vz = 0;
                        HM.targets[k].ox = 0;
                        HM.targets[k].oy = 0;
                        HM.targets[k].oz = 0;
                    });
                }

                // Update VRM internal state (springs, lookAt, etc.)
                try { vrm.update(dt); } catch {}

                if (window.controls) {
                    window.controls.update();
                }
                
                // Slowly rotate Earth
                if (window._earthMesh) window._earthMesh.rotation.y += dt * 0.05;

                if (typeof currentHologram !== 'undefined' && currentHologram) {
                    currentHologram.rotation.y += dt * 0.5;
                }
                
                // Holographic floating menu animation
                if (window.gameMenu && window.gameMenu.visible) {
                    window.gameMenu.position.y = 1.2 + Math.sin(t * 1.5) * 0.015;
                }
                if (window.backMenu && window.backMenu.visible) {
                    window.backMenu.position.y = 1.2 + Math.sin(t * 1.5) * 0.015;
                }

                // Snap character Y to flat floor (Y=0) always
                if (typeof vrm !== 'undefined' && vrm && vrm.scene) {
                    // Only reset Y if not being gsap-animated (gsap handles X/Z for hologram views)
                    if (!vrm.scene._gsapYActive) {
                        vrm.scene.position.y = 0;
                    }
                }

                threeRenderer.render(threeScene, threeCamera);
            };

            threeRenderer.setAnimationLoop(animate);
        }

        const initModel = async () => {
            try {
                const u = modelUrl.toLowerCase();
                if (u.endsWith('.vrm')) {
                    await setupVrm();
                } else if (u.endsWith('.glb') || u.endsWith('.gltf')) {
                    await setupGlb();
                } else {
                    await setupLive2d();
                }
            } catch (err) {
                console.error('Failed to load model', err);
                document.getElementById('loading').innerText = 'Failed to load model. Check console.';
                paramEl.textContent = '(load failed)';
                rigEl.textContent = '(load failed)';
            }
        }

        initModel();

        let ws = null;
        let audioCtx = null;
        let analyser = null;
        let dataArray = null;

        const b64ToBytes = (b64) => {
            const bin = atob(b64);
            const bytes = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
            return bytes;
        };

        let nextAudioTime = 0;
        let analyserConnected = false;
        const playWav = async (wav_b64) => {
            if (!audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') {
                    await audioCtx.resume();
                }
                const bytes = b64ToBytes(wav_b64);
                const audioData = await audioCtx.decodeAudioData(bytes.buffer);
                const source = audioCtx.createBufferSource();
                source.buffer = audioData;
                source.connect(analyser);
                // Only connect analyser -> destination once (avoid redundant graph connections)
                if (!analyserConnected) {
                    analyser.connect(audioCtx.destination);
                    analyserConnected = true;
                }
                
                const now = audioCtx.currentTime;
                if (nextAudioTime < now) {
                    // Start immediately with a tiny 5ms buffer to prevent click artifacts
                    nextAudioTime = now + 0.005;
                }
                source.start(nextAudioTime);
                nextAudioTime += audioData.duration;
            } catch (err) {
                console.error("Audio playback error:", err);
                if (window.captionEl) window.captionEl.textContent = '[Audio Error] ' + err.message;
            }
        };

        const connectWebSocket = () => {
            const wsUrl = "ws://" + window.location.hostname + ":8765";
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log("Connected to VR backend!");
                wsStatusEl.textContent = 'connected';
            };
            
            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === "assistant_reply") {
                        let text = msg.text || "";
                        // Strip ALL bracket tags like [Happy], [Neutral], [Angry] etc.
                        let actualText = text.replace(/\[.*?\]/g, '').trim();
                        
                        // Parse emotion tags for VRM expressions
                        const emotionMatch = text.match(/\[(.*?)\]/);
                        if (emotionMatch && vrm && vrm.expressionManager) {
                            const emLabel = emotionMatch[1].toLowerCase();
                            
                            // Reset core expressions
                            [VRMExpressionPresetName.neutral, VRMExpressionPresetName.happy, 
                             VRMExpressionPresetName.surprised, VRMExpressionPresetName.angry, 
                             VRMExpressionPresetName.relaxed].forEach(name => {
                                vrm.expressionManager.setValue(name, 0.0);
                            });
                            
                            let preset = VRMExpressionPresetName.neutral;
                            if (emLabel === 'happy' || emLabel === 'smile') preset = VRMExpressionPresetName.happy;
                            else if (emLabel === 'surprised') preset = VRMExpressionPresetName.surprised;
                            else if (emLabel === 'angry') preset = VRMExpressionPresetName.angry;
                            else if (emLabel === 'thinking' || emLabel === 'relaxed') preset = VRMExpressionPresetName.relaxed;
                            
                            vrm.expressionManager.setValue(preset, 1.0);
                        }

                        if (captionEl && actualText) captionEl.textContent = actualText;
                        if (msg.wav_b64) {
                            playWav(msg.wav_b64).catch(e => console.error("Audio playback error:", e));
                        }
                    } else if (msg.type === "pong") {
                        console.log(`pong t=${msg.t}`);
                    } else if (msg.type === "error") {
                        console.error(`Error: ${msg.error}`);
                    } else if (msg.volume !== undefined) {
                        // fallback for direct volume stream mapping
                        const v = Math.max(0, Math.min(1, Number(msg.volume)));
                        mouthValue = v;
                        volEl.textContent = v.toFixed(3);
                    }
                    if (msg.event) {
                        startEvent(msg.event);
                    }
                } catch (err) {
                    console.error("Bad msg", err);
                }
            };

            ws.onclose = () => {
                console.log("WebSocket Disconnected. Reconnecting...");
                wsStatusEl.textContent = 'disconnected';
                setTimeout(connectWebSocket, 1000);
            }

            ws.onerror = () => {
                wsStatusEl.textContent = 'error';
                console.error('WebSocket error');
            }
        };

        connectWebSocket();

        // Calculate volume for lip sync
        const updateAudioVolume = () => {
            if (analyser && dataArray) {
                analyser.getFloatTimeDomainData(dataArray);
                let sum = 0;
                for(let i=0; i<dataArray.length; i++) sum += dataArray[i] * dataArray[i];
                let rms = Math.sqrt(sum / dataArray.length);
                mouthValue = Math.min(1.0, rms * 15.0); // Adjust gain as needed
                volEl.textContent = mouthValue.toFixed(3);
            }
            requestAnimationFrame(updateAudioVolume);
        };

        document.getElementById('startBtn').addEventListener('click', async () => {
            document.getElementById('startOverlay').style.display = 'none';
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;  // Smaller FFT = less latency in volume detection
                dataArray = new Float32Array(analyser.frequencyBinCount);
                updateAudioVolume();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "start_game" }));
            }
            if (window.gameMenu) {
                window.gameMenu.visible = true;
            }
        });

        let currentHologram = null;
        window.handleMenuSelection = (sceneId) => {
            if (currentHologram) {
                threeScene.remove(currentHologram);
                currentHologram = null;
            }

            if (sceneId === 'main') {
                if (window.gameMenu) window.gameMenu.visible = true;
                if (window.backMenu) window.backMenu.visible = false;
                document.getElementById('chatOverlay').style.display = 'none';
                
                // Return character to center
                if (typeof gsap !== 'undefined' && typeof vrm !== 'undefined' && vrm) {
                    gsap.to(vrm.scene.position, { x: 0, z: 0, duration: 1.5, ease: "power2.inOut" });
                }
            } else {
                if (window.gameMenu) window.gameMenu.visible = false;
                if (window.backMenu) window.backMenu.visible = true;
                
                if (sceneId === 'chat') {
                    document.getElementById('chatOverlay').style.display = 'flex';
                    // Return character to center for chatting
                    if (typeof gsap !== 'undefined' && typeof vrm !== 'undefined' && vrm) {
                        gsap.to(vrm.scene.position, { x: 0, z: 0, duration: 1.5, ease: "power2.inOut" });
                    }
                } else {
                    document.getElementById('chatOverlay').style.display = 'none';
                    // Move character to the left to make room for massive holograms!
                    if (typeof gsap !== 'undefined' && typeof vrm !== 'undefined' && vrm) {
                        gsap.to(vrm.scene.position, { x: -0.9, z: -0.5, duration: 1.5, ease: "power2.inOut" });
                    }
                }
                
                // Spawn hologram logic
                let targetAsset = null;
                if (sceneId === 'moon') targetAsset = 'assets/Galileo.glb';
                else if (sceneId === 'solar') targetAsset = 'assets/solar_system_animation/scene.gltf';
                else if (sceneId === 'iss') targetAsset = 'assets/iss.glb';
                else if (sceneId === 'jwst') targetAsset = 'assets/jwst.glb';

                if (targetAsset) {
                    if (window.captionEl) window.captionEl.textContent = "Downloading Model... Please wait!";
                    
                    const loader = new GLTFLoader();
                    loader.load(targetAsset, (gltf) => {
                        if (window.captionEl && window.captionEl.textContent.includes("Downloading")) window.captionEl.textContent = "";

                        const model = gltf.scene || gltf.scenes[0];
                        if (!model) return;
                        
                        if (currentHologram) { threeScene.remove(currentHologram); }

                        // Auto-scale and center the model
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        // Fit within a massive 1.6 unit boundary!
                        const scale = (maxDim > 0) ? (1.6 / maxDim) : 1; 
                        
                        model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                        model.scale.set(scale, scale, scale);
                        
                        const wrapper = new THREE.Group();
                        wrapper.add(model);
                        // Position massive hologram dead center (x: 0.3 offset creates balance)
                        wrapper.position.set(0.3, 1.2, -0.5);

                        currentHologram = wrapper;
                        threeScene.add(wrapper);
                        
                        // Stronger Hologram light from the front
                        if (!window.hologramLight) {
                            window.hologramLight = new THREE.DirectionalLight(0xffffff, 4.0);
                            window.hologramLight.position.set(0.5, 2, 2);
                            threeScene.add(window.hologramLight);
                        }
                    });
                }
            }
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "menu_select", scene: sceneId }));
            }
        };

        // Chat Input Handlers
        document.getElementById('chatSendBtn').addEventListener('click', () => {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (text && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: "user_text", text: text, mode: "chat" }));
                input.value = "";
            }
        });
        document.getElementById('chatInput').addEventListener('keydown', (e) => {
             if(e.key === 'Enter') document.getElementById('chatSendBtn').click();
        });

        // Voice API logic (MediaRecorder over WS to Faster-Whisper!)
        const micBtn = document.createElement('button');
        micBtn.innerText = "🎤 Hold to Talk";
        micBtn.className = "mic-btn-modern";
        document.getElementById('chatOverlay').appendChild(micBtn);

        let mediaRecorder = null;
        let audioChunks = [];

        const resetMicBtn = () => {
            micBtn.innerText = "🎤 Hold to Talk";
            micBtn.style.background = "";
            micBtn.style.borderColor = "";
        };

        const stopRecording = () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            resetMicBtn();
        };

        micBtn.addEventListener('mousedown', async () => {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("Microphone not supported on this browser context! Use localhost or HTTPS.");
                return;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // We use webm audio which works smoothly on Chrome.
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        const b64 = reader.result.split(',')[1];
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: "voice_audio", b64: b64, mode: "chat" }));
                            if (captionEl) captionEl.textContent = "Processing speech locally...";
                        }
                    };
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                micBtn.innerText = "🛑 Listening...";
                micBtn.style.background = "rgba(255, 34, 34, 0.4)";
                micBtn.style.borderColor = "rgba(255, 34, 34, 0.8)";
            } catch(e) {
                console.error("Mic access denied", e);
                resetMicBtn();
            }
        });

        micBtn.addEventListener('mouseup', stopRecording);
        micBtn.addEventListener('mouseleave', stopRecording);
    </script>
</body>
</html>
