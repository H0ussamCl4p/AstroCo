<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroCo</title>
        <!-- Three.js is loaded via ES Modules inside the main script block.
            This avoids relying on legacy globals like THREE.GLTFLoader. -->

        <!-- Import map so Three.js examples can import from bare specifiers like "three" -->
        <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@2.1.1/lib/three-vrm.module.js"
            }
        }
        </script>

    <!-- Core Live2D Web SDK -->
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <!-- PixiJS -->
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.2/dist/browser/pixi.min.js"></script>
    <!-- Pixi Live2D Display Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
    <!-- GSAP for smooth character animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        :root {
            --primary: #00ffcc;
            --primary-glow: rgba(0, 255, 204, 0.4);
            --bg-glass: rgba(15, 20, 30, 0.45);
            --border-glass: rgba(255, 255, 255, 0.15);
        }
        body { margin: 0; overflow: hidden; background-color: #050510; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Outfit', sans-serif; color: #fff; }
        canvas { display: block; }
        
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(16px) saturate(120%);
            -webkit-backdrop-filter: blur(16px) saturate(120%);
            border: 1px solid var(--border-glass);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        #loading {
            position: absolute;
            top: 20%;
            color: var(--primary);
            font-weight: 300;
            font-size: 18px;
            letter-spacing: 3px;
            text-transform: uppercase;
            animation: pulseText 1.5s infinite alternate;
            z-index: 1001;
        }
        @keyframes pulseText { 0% { opacity: 0.5; } 100% { opacity: 1; text-shadow: 0 0 10px var(--primary-glow); } }

        #caption {
            position: absolute;
            left: 50%;
            bottom: 140px;
            transform: translateX(-50%);
            width: min(700px, calc(100vw - 60px));
            max-height: 120px;
            overflow-y: auto;
            font-size: 17px;
            font-weight: 400;
            line-height: 1.6;
            text-align: center;
            padding: 14px 22px;
            border-radius: 16px;
            user-select: none;
            pointer-events: none;
            white-space: pre-wrap;
            transition: opacity 0.3s ease;
            z-index: 400;
        }
        #caption:not(:empty) { opacity: 1; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        #caption:empty { opacity: 0; }
        @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }

        #debug {
            position: absolute;
            left: 20px;
            top: 20px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 11px;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.8;
            user-select: none;
            color: rgba(255, 255, 255, 0.8);
            border-left: 3px solid var(--primary);
        }
        #debug span { color: var(--primary); font-weight: bold; }

        #startOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(20, 10, 40, 0.7) 0%, rgba(5, 5, 10, 0.95) 100%);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .hud-ring {
            position: absolute;
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 2px dashed rgba(0, 255, 204, 0.2);
            animation: spin 30s linear infinite;
            pointer-events: none;
        }
        .hud-ring-2 {
            position: absolute;
            width: 400px; height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 204, 0.1);
            border-top: 2px solid var(--primary);
            animation: spin-reverse 20s linear infinite;
            pointer-events: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        #startBtn {
            position: relative;
            padding: 16px 48px;
            font-size: 22px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            background: rgba(0, 255, 204, 0.1);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 50px;
            box-shadow: 0 0 15px var(--primary-glow), inset 0 0 15px var(--primary-glow);
            text-shadow: 0 0 8px var(--primary-glow);
            transition: all 0.3s ease;
            z-index: 2;
        }
        #startBtn:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 30px var(--primary-glow), inset 0 0 20px rgba(255,255,255,0.5);
            transform: scale(1.05);
        }

        #chatOverlay {
            position: absolute;
            bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none;
            z-index: 500;
            padding: 10px 16px;
            border-radius: 30px;
            gap: 10px;
            align-items: center;
        }
        #chatInput {
            width: 320px; padding: 14px 24px;
            font-family: 'Outfit', sans-serif; font-size: 16px; color: #fff;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; outline: none; transition: all 0.3s ease;
        }
        #chatInput::placeholder { color: rgba(255, 255, 255, 0.5); }
        #chatInput:focus { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); background: rgba(0, 0, 0, 0.4); }
        #chatSendBtn {
            padding: 12px 24px;
            font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600;
            color: #000; background: var(--primary);
            border: none; border-radius: 24px; cursor: pointer;
            box-shadow: 0 0 10px var(--primary-glow); transition: all 0.2s ease;
        }
        #chatSendBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--primary-glow); background: #33ffdb; }
        
        .mic-btn-modern {
            padding: 12px 24px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600;
            color: #fff; background: rgba(85, 85, 255, 0.3); border: 1px solid rgba(85, 85, 255, 0.8);
            border-radius: 24px; cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: 0 0 10px rgba(85, 85, 255, 0.4); transition: all 0.2s ease;
        }
        .mic-btn-modern:hover { transform: scale(1.05); background: rgba(85, 85, 255, 0.5); }

        /* Hide/style the ugly VR NOT SUPPORTED button */
        #VRButton, [id^="VR"] {
            position: fixed !important;
            bottom: 10px !important;
            right: 10px !important;
            left: auto !important;
            width: auto !important;
            padding: 8px 16px !important;
            font-family: 'Outfit', sans-serif !important;
            font-size: 11px !important;
            letter-spacing: 1px !important;
            background: rgba(15, 20, 30, 0.6) !important;
            color: rgba(255, 255, 255, 0.4) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px !important;
            backdrop-filter: blur(10px) !important;
            z-index: 100 !important;
            opacity: 0.5 !important;
            transition: opacity 0.3s !important;
        }
        #VRButton:hover, [id^="VR"]:hover {
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div id="startOverlay">
        <div class="hud-ring"></div>
        <div class="hud-ring-2"></div>
        <button id="startBtn">Enter Space Festival</button>
    </div>
    <div id="chatOverlay" class="glass-panel">
        <input type="text" id="chatInput" placeholder="Establish Comm-Link..." />
        <button id="chatSendBtn">Transmit</button>
    </div>
    <div id="loading">Establishing Neural Link...</div>
    <div id="caption" class="glass-panel"></div>
    <div id="debug" class="glass-panel">
        SYS_WS: <span id="wsStatus">connecting</span><br/>
        AUD_LVL: <span id="vol">0.000</span><br/>
        SPEECH: <span id="speech">0.000</span><br/>
        GESTURE: <span id="gesture">(none)</span><br/>
        PARAM_ID: <span id="param">(detecting)</span><br/>
        RIG_DATA: <span id="rig">(detecting)</span>
    </div>
    <canvas id="canvas"></canvas>
    
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils, VRMHumanBoneName, VRMExpressionPresetName } from '@pixiv/three-vrm';
        import { VRButton } from 'three/examples/jsm/webxr/VRButton.js';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

        // Ensure consistent color handling across browsers/Three versions
        try { THREE.ColorManagement.enabled = true; } catch {}

        const canvas = document.getElementById('canvas');

        // Point this at either:
        // - a local GLB: "character.glb" (recommended)
        // - a Live2D json: "some_model.model3.json"
        // - a remote URL (if CORS allows)
        const modelUrl = "models/space-avatar.vrm";

        let mouthValue = 0.0;

        // Live2D state
        let live2dApp = null;
        let currentLive2dModel = null;
        let live2dMouthParamId = null;

        // GLB state
        let threeRenderer = null;
        let threeScene = null;
        let threeCamera = null;
        let glbRoot = null;
        let glbMouth = null; // { mesh, index, name } OR { bone, name }
        let glbBones = null;
        let glbBoneBase = null;
        let glbJawBase = null;
        let glbRootBase = null;
        let glbRigInfo = null;

        // VRM state
        let vrm = null;
        let vrmBaseRotations = null;
        let vrmMouthMode = null; // 'blendshape'

        // Gesture/expression state (one-shot events from Python)
        let activeGesture = null; // { name, startS, durationS, id }
        let lastGestureId = null;

        let activeExpression = null;
        let clock = new THREE.Clock();
        // { name, startS, durationS, value, id }
        let lastExpressionId = null;

        // Smooth volume on the client for nicer animation
        let speechLevel = 0.0;

        const wsStatusEl = document.getElementById('wsStatus');
        const volEl = document.getElementById('vol');
        const speechEl = document.getElementById('speech');
        const paramEl = document.getElementById('param');
        const rigEl = document.getElementById('rig');
        const gestureEl = document.getElementById('gesture');
        const captionEl = document.getElementById('caption');

        const toIdString = (id) => {
            try { return String(id); } catch { return '' + id; }
        }

        const detectLive2dMouthParam = (model) => {
            try {
                const core = model.internalModel.coreModel;
                const ids = [];

                if (core && typeof core.getParameterCount === 'function' && typeof core.getParameterId === 'function') {
                    const count = core.getParameterCount();
                    for (let i = 0; i < count; i++) {
                        ids.push(toIdString(core.getParameterId(i)));
                    }
                }

                const preferred = [
                    'ParamMouthOpenY',
                    'PARAM_MOUTH_OPEN_Y',
                    'ParamMouthOpen',
                    'MouthOpen',
                    'ParamMouthOpenX',
                ];

                for (const p of preferred) {
                    if (ids.includes(p)) return p;
                }

                const fallback = ids.find(x => /mouth/i.test(x) && /open/i.test(x));
                return fallback || null;
            } catch (e) {
                return null;
            }
        }

        const setupLive2d = async () => {
            live2dApp = new PIXI.Application({
                view: canvas,
                autoStart: true,
                resizeTo: window,
                backgroundColor: 0x222222
            });

            const model = await PIXI.live2d.Live2DModel.from(modelUrl);
            document.getElementById('loading').style.display = 'none';
            live2dApp.stage.addChild(model);

            const updateTransform = () => {
                const scaleX = innerWidth / model.width;
                const scaleY = innerHeight / model.height;
                model.scale.set(Math.min(scaleX, scaleY) * 0.85);
                model.x = (innerWidth - model.width * model.scale.x) / 2;
                model.y = (innerHeight - model.height * model.scale.y) / 2 + (model.height * model.scale.y * 0.1);
            };
            updateTransform();
            window.addEventListener('resize', updateTransform);

            currentLive2dModel = model;
            live2dMouthParamId = detectLive2dMouthParam(model);
            paramEl.textContent = live2dMouthParamId || '(not found)';

            live2dApp.ticker.add(() => {
                if (!currentLive2dModel) return;
                const v = mouthValue;
                try {
                    const core = currentLive2dModel.internalModel.coreModel;
                    if (!core || typeof core.setParameterValueById !== 'function') return;

                    if (live2dMouthParamId) {
                        core.setParameterValueById(live2dMouthParamId, v);
                    } else {
                        core.setParameterValueById('ParamMouthOpenY', v);
                        core.setParameterValueById('PARAM_MOUTH_OPEN_Y', v);
                    }
                } catch (e) {}
            });
        }

        const findGlbMouthTarget = (root) => {
            // 1) Prefer morph targets / blendshapes with mouth/viseme names
            let best = null;
            root.traverse((obj) => {
                if (!obj.isMesh) return;
                const dict = obj.morphTargetDictionary;
                const influences = obj.morphTargetInfluences;
                if (!dict || !influences) return;
                for (const [name, idx] of Object.entries(dict)) {
                    const n = String(name).toLowerCase();
                    // Common names across VRM/ARKit/various rigs
                    if (
                        n.includes('viseme') ||
                        n.includes('jawopen') ||
                        n.includes('mouthopen') ||
                        n.includes('mouth_open') ||
                        n.includes('mouth open') ||
                        n.includes('vrc.v_aa') ||
                        n === 'a' ||
                        n === 'aa' ||
                        n.endsWith('_a')
                    ) {
                        best = { type: 'morph', mesh: obj, index: idx, name };
                        return;
                    }
                }
            });
            if (best) return best;

            // 2) Fallback: try jaw bone rotation
            let jawBone = null;
            root.traverse((obj) => {
                const nm = (obj.name || '').toLowerCase();
                if (!obj.isBone) return;
                if (nm.includes('jaw') || nm.includes('mouth')) {
                    jawBone = obj;
                }
            });
            if (jawBone) return { type: 'bone', bone: jawBone, name: jawBone.name || 'jaw' };

            return null;
        }

        const findGlbBones = (root) => {
            const bones = {};

            const want = {
                spine: /\bspine\b/i,
                spine1: /\bspine1\b/i,
                spine2: /\bspine2\b/i,
                chest: /\bchest\b/i,
                neck: /\bneck\b/i,
                head: /\bhead\b/i,
                jaw: /\bjaw\b/i,

                leftShoulder: /leftshoulder|lshoulder|\bshoulder\.l\b|\bclaviclel\b/i,
                leftUpperArm: /leftarm|lupperarm|\bupperarm\.l\b|\barm\.l\b/i,
                leftLowerArm: /leftforearm|lforearm|\blowerarm\.l\b|\bforearm\.l\b/i,
                leftHand: /lefthand|\bhand\.l\b|\bwrist\.l\b/i,

                rightShoulder: /rightshoulder|rshoulder|\bshoulder\.r\b|\bclavicler\b/i,
                rightUpperArm: /rightarm|rupperarm|\bupperarm\.r\b|\barm\.r\b/i,
                rightLowerArm: /rightforearm|rforearm|\blowerarm\.r\b|\bforearm\.r\b/i,
                rightHand: /righthand|\bhand\.r\b|\bwrist\.r\b/i,
            };

            root.traverse((obj) => {
                if (!obj.isBone) return;
                const n = (obj.name || '').trim();
                if (!n) return;

                for (const [key, rx] of Object.entries(want)) {
                    if (!bones[key] && rx.test(n)) {
                        bones[key] = obj;
                    }
                }
            });

            return bones;
        }

        const getGlbRigInfo = (root) => {
            const info = {
                meshCount: 0,
                skinnedMeshCount: 0,
                boneCount: 0,
                morphTargetCount: 0,
            };

            root.traverse((obj) => {
                if (obj.isBone) info.boneCount++;
                if (obj.isMesh) {
                    info.meshCount++;
                    if (obj.isSkinnedMesh) info.skinnedMeshCount++;
                    if (obj.morphTargetDictionary) {
                        info.morphTargetCount += Object.keys(obj.morphTargetDictionary).length;
                    }
                }
            });

            return info;
        }

        const computeMeshBounds = (root) => {
            // Using Box3.setFromObject(root) includes bones/empties which can make the bounds weird.
            // We compute bounds from visible meshes only.
            const box = new THREE.Box3();
            let hasMesh = false;
            root.traverse((obj) => {
                if (!obj || !obj.isMesh) return;
                const geom = obj.geometry;
                if (!geom) return;

                if (!geom.boundingBox) {
                    try { geom.computeBoundingBox(); } catch {}
                }
                const bb = geom.boundingBox;
                if (!bb) return;

                const worldBB = bb.clone();
                worldBB.applyMatrix4(obj.matrixWorld);

                if (!hasMesh) {
                    box.copy(worldBB);
                    hasMesh = true;
                } else {
                    box.union(worldBB);
                }
            });
            return hasMesh ? box : new THREE.Box3().setFromObject(root);
        }

        const fitGlbToView = (root, camera) => {
            // Ensure transforms are up to date before measuring
            try { root.updateWorldMatrix(true, true); } catch {}

            const box = computeMeshBounds(root);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            // Center the model at the origin
            root.position.x -= center.x;
            root.position.y -= center.y;
            root.position.z -= center.z;

            const fov = camera.fov * (Math.PI / 180);
            const aspect = camera.aspect || (window.innerWidth / window.innerHeight);

            // Use the largest dimension to avoid tiny/huge fits caused by extreme aspect ratios
            const maxDim = Math.max(size.x, size.y, size.z);
            const distance = (maxDim * 0.5) / Math.tan(fov * 0.5);

            const margin = 1.35; // bigger = more space around model
            const cameraZ = Math.max(0.35, distance * margin);

            camera.position.set(0, 0, cameraZ);
            camera.near = Math.max(0.01, distance / 100);
            camera.far = Math.max(1000, distance * 100);
            camera.lookAt(0, 0, 0);
            camera.updateProjectionMatrix();
        }

        const setupGlb = async () => {
            threeRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
            threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
            threeRenderer.setSize(window.innerWidth, window.innerHeight, false);
            threeRenderer.setClearColor(0x222222, 1);
            // Correct color output (otherwise textures often look gray/washed)
            threeRenderer.outputColorSpace = THREE.SRGBColorSpace;
            threeRenderer.toneMapping = THREE.ACESFilmicToneMapping;
            threeRenderer.toneMappingExposure = 1.0;

            threeScene = new THREE.Scene();
            threeCamera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 1000);

            const ambient = new THREE.AmbientLight(0xffffff, 0.9);
            const key = new THREE.DirectionalLight(0xffffff, 1.2);
            key.position.set(1, 2, 3);
            threeScene.add(ambient);
            threeScene.add(key);

            const loader = new GLTFLoader();
            const gltf = await loader.loadAsync(modelUrl);
            glbRoot = gltf.scene;
            threeScene.add(glbRoot);
            document.getElementById('loading').style.display = 'none';

            fitGlbToView(glbRoot, threeCamera);

            glbRootBase = {
                position: glbRoot.position.clone(),
                rotation: glbRoot.rotation.clone(),
                scale: glbRoot.scale.clone(),
            };

            glbMouth = findGlbMouthTarget(glbRoot);
            glbBones = findGlbBones(glbRoot);
            glbBoneBase = {};
            if (glbBones) {
                for (const [key, bone] of Object.entries(glbBones)) {
                    if (!bone) continue;
                    glbBoneBase[key] = { x: bone.rotation.x, y: bone.rotation.y, z: bone.rotation.z };
                }
            }
            if (glbMouth && glbMouth.type === 'bone' && glbMouth.bone) {
                glbJawBase = { x: glbMouth.bone.rotation.x, y: glbMouth.bone.rotation.y, z: glbMouth.bone.rotation.z };
            } else {
                glbJawBase = null;
            }

            glbRigInfo = getGlbRigInfo(glbRoot);
            const boneKeys = glbBones ? Object.keys(glbBones).filter(k => !!glbBones[k]) : [];
            rigEl.textContent = `meshes=${glbRigInfo.meshCount}, skinned=${glbRigInfo.skinnedMeshCount}, bones=${glbRigInfo.boneCount}, morphs=${glbRigInfo.morphTargetCount}, boneKeys=[${boneKeys.join(',')}]`;
            paramEl.textContent = glbMouth ? (glbMouth.type + ':' + glbMouth.name) : '(no mouth target)';

            const onResize = () => {
                threeRenderer.setSize(window.innerWidth, window.innerHeight, false);
                threeCamera.aspect = window.innerWidth / window.innerHeight;
                threeCamera.updateProjectionMatrix();
                if (glbRoot) {
                    fitGlbToView(glbRoot, threeCamera);
                    glbRootBase = {
                        position: glbRoot.position.clone(),
                        rotation: glbRoot.rotation.clone(),
                        scale: glbRoot.scale.clone(),
                    };
                }
            }
            window.addEventListener('resize', onResize);

            const animate = () => {
                requestAnimationFrame(animate);

                // Smooth speech level (fast up, slower down)
                const vRaw = mouthValue;
                if (vRaw > speechLevel) {
                    speechLevel = speechLevel * 0.75 + vRaw * 0.25;
                } else {
                    speechLevel = speechLevel * 0.88 + vRaw * 0.12;
                }
                speechEl.textContent = speechLevel.toFixed(3);

                const t = performance.now() * 0.001;
                const s = Math.max(0, Math.min(1, speechLevel));
                const wave = Math.sin(t * 6.0);
                const waveSlow = Math.sin(t * 2.0);

                // Drive mouth
                if (glbMouth) {
                    const v = s;
                    if (glbMouth.type === 'morph') {
                        glbMouth.mesh.morphTargetInfluences[glbMouth.index] = v;
                    } else if (glbMouth.type === 'bone') {
                        // small jaw drop rotation
                        const base = glbJawBase || { x: 0, y: 0, z: 0 };
                        glbMouth.bone.rotation.x = base.x + (-0.35 * v);
                        glbMouth.bone.rotation.y = base.y;
                        glbMouth.bone.rotation.z = base.z;
                    }
                }

                // Drive whole-body motion from speech
                if (glbBones) {
                    const torsoKey = glbBones.spine2 ? 'spine2' : (glbBones.chest ? 'chest' : (glbBones.spine1 ? 'spine1' : (glbBones.spine ? 'spine' : null)));
                    const torso = torsoKey ? glbBones[torsoKey] : null;
                    if (torso && glbBoneBase && glbBoneBase[torsoKey]) {
                        const base = glbBoneBase[torsoKey];
                        torso.rotation.y = base.y + (0.08 * s * waveSlow);
                        torso.rotation.x = base.x + (0.04 * s * Math.sin(t * 3.0));
                        torso.rotation.z = base.z;
                    }

                    const headKey = glbBones.head ? 'head' : (glbBones.neck ? 'neck' : null);
                    const head = headKey ? glbBones[headKey] : null;
                    if (head && glbBoneBase && glbBoneBase[headKey]) {
                        const base = glbBoneBase[headKey];
                        head.rotation.x = base.x + (0.06 * s * (0.6 + 0.4 * wave));
                        head.rotation.y = base.y + (0.05 * s * Math.sin(t * 2.7));
                        head.rotation.z = base.z;
                    }

                    const lUpperKey = glbBones.leftUpperArm ? 'leftUpperArm' : (glbBones.leftShoulder ? 'leftShoulder' : null);
                    const rUpperKey = glbBones.rightUpperArm ? 'rightUpperArm' : (glbBones.rightShoulder ? 'rightShoulder' : null);
                    const lForeKey = glbBones.leftLowerArm ? 'leftLowerArm' : null;
                    const rForeKey = glbBones.rightLowerArm ? 'rightLowerArm' : null;
                    const lHandKey = glbBones.leftHand ? 'leftHand' : null;
                    const rHandKey = glbBones.rightHand ? 'rightHand' : null;

                    const lUpper = lUpperKey ? glbBones[lUpperKey] : null;
                    const rUpper = rUpperKey ? glbBones[rUpperKey] : null;
                    const lFore = lForeKey ? glbBones[lForeKey] : null;
                    const rFore = rForeKey ? glbBones[rForeKey] : null;
                    const lHand = lHandKey ? glbBones[lHandKey] : null;
                    const rHand = rHandKey ? glbBones[rHandKey] : null;

                    if (lUpper && glbBoneBase && glbBoneBase[lUpperKey]) {
                        const base = glbBoneBase[lUpperKey];
                        lUpper.rotation.z = base.z + (0.10 * s * (0.6 + 0.4 * waveSlow));
                        lUpper.rotation.x = base.x + (-0.06 * s);
                        lUpper.rotation.y = base.y;
                    }
                    if (rUpper && glbBoneBase && glbBoneBase[rUpperKey]) {
                        const base = glbBoneBase[rUpperKey];
                        rUpper.rotation.z = base.z + (-0.10 * s * (0.6 + 0.4 * waveSlow));
                        rUpper.rotation.x = base.x + (-0.06 * s);
                        rUpper.rotation.y = base.y;
                    }
                    if (lFore && glbBoneBase && glbBoneBase[lForeKey]) {
                        const base = glbBoneBase[lForeKey];
                        lFore.rotation.x = base.x + (-0.10 * s * (0.5 + 0.5 * wave));
                        lFore.rotation.y = base.y;
                        lFore.rotation.z = base.z;
                    }
                    if (rFore && glbBoneBase && glbBoneBase[rForeKey]) {
                        const base = glbBoneBase[rForeKey];
                        rFore.rotation.x = base.x + (-0.10 * s * (0.5 + 0.5 * wave));
                        rFore.rotation.y = base.y;
                        rFore.rotation.z = base.z;
                    }
                    if (lHand && glbBoneBase && glbBoneBase[lHandKey]) {
                        const base = glbBoneBase[lHandKey];
                        lHand.rotation.z = base.z + (0.10 * s * Math.sin(t * 7.0));
                        lHand.rotation.x = base.x;
                        lHand.rotation.y = base.y;
                    }
                    if (rHand && glbBoneBase && glbBoneBase[rHandKey]) {
                        const base = glbBoneBase[rHandKey];
                        rHand.rotation.z = base.z + (-0.10 * s * Math.sin(t * 7.0));
                        rHand.rotation.x = base.x;
                        rHand.rotation.y = base.y;
                    }
                }

                // Fallback for static/unrigged GLBs (no jaw morphs/bones, no arm bones)
                if (glbRoot && glbRootBase && glbRigInfo) {
                    const hasMouthTarget = !!glbMouth;
                    const hasMorphs = glbRigInfo.morphTargetCount > 0;
                    const hasUsableSkeleton = glbRigInfo.boneCount > 1;
                    if (!hasMouthTarget && !hasMorphs && !hasUsableSkeleton) {
                        const baseP = glbRootBase.position;
                        const baseR = glbRootBase.rotation;
                        glbRoot.position.y = baseP.y + (0.035 * s * (0.4 + 0.6 * waveSlow));
                        glbRoot.rotation.z = baseR.z + (0.05 * s * wave);
                        glbRoot.rotation.y = baseR.y + (0.06 * s * waveSlow);
                        glbRoot.rotation.x = baseR.x + (0.03 * s * Math.sin(t * 3.6));
                    }
                }

                threeRenderer.render(threeScene, threeCamera);
            }

            animate();
        }

        const getVrmBone = (boneName) => {
            try {
                if (!vrm || !vrm.humanoid) return null;
                return vrm.humanoid.getNormalizedBoneNode(boneName) || null;
            } catch {
                return null;
            }
        }

                const startEvent = (ev) => {
            if (!ev || !ev.type) return;

            if (ev.type === 'caption') {
                if (captionEl) {
                    captionEl.textContent = String(ev.text || '');
                }
                return;
            }

            if (ev.type === 'gesture') {
                const id = ev.id || null;
                if (id && id === lastGestureId) return;
                lastGestureId = id;

                const name = ev.name || '';
                const allowed = new Set(['wave', 'nod', 'shake', 'shrug']);
                if (!allowed.has(name)) return;

                if (gestureEl) gestureEl.textContent = name;
                
                // Using GSAP for silky smooth "proper" animations
                const head = getVrmBone(VRMHumanBoneName.Head) || getVrmBone(VRMHumanBoneName.Neck);
                const torso = getVrmBone(VRMHumanBoneName.Chest) || getVrmBone(VRMHumanBoneName.Spine);
                const rUpper = getVrmBone(VRMHumanBoneName.RightUpperArm);
                const rFore = getVrmBone(VRMHumanBoneName.RightLowerArm);
                const rHand = getVrmBone(VRMHumanBoneName.RightHand);
                const lUpper = getVrmBone(VRMHumanBoneName.LeftUpperArm);

                // Revert any running GSAP animations on bones
                const bonesToKill = [head, torso, rUpper, rFore, rHand, lUpper].filter(Boolean);
                if (bonesToKill.length > 0) {
                    gsap.killTweensOf(bonesToKill.map(b => b.rotation));
                }

                if (name === 'wave' && rUpper && rFore && rHand && vrmBaseRotations) {
                    const ub = vrmBaseRotations[VRMHumanBoneName.RightUpperArm];
                    const fb = vrmBaseRotations[VRMHumanBoneName.RightLowerArm];
                    const hb = vrmBaseRotations[VRMHumanBoneName.RightHand];
                    
                    if (ub && fb && hb) {
                        window.isGesturing = true;
                        const tl = gsap.timeline();
                        tl.eventCallback('onComplete', () => { window.isGesturing = false; });
                        // Raise arm
                        tl.to(rUpper.rotation, { z: ub.z - 1.2, x: ub.x - 0.4, duration: 0.4, ease: "power2.out" }, 0);
                        tl.to(rFore.rotation, { x: fb.x - 0.4, duration: 0.4, ease: "power2.out" }, 0);
                        
                        // Wave back and forth
                        tl.to(rHand.rotation, { y: hb.y + 0.6, duration: 0.2, ease: "sine.inOut", yoyo: true, repeat: 5 }, 0.2);
                        
                        // Return to base
                        tl.to([rUpper.rotation, rFore.rotation, rHand.rotation], {
                            x: (i, tgt) => i===0 ? ub.x : (i===1 ? fb.x : hb.x),
                            y: (i, tgt) => i===0 ? ub.y : (i===1 ? fb.y : hb.y),
                            z: (i, tgt) => i===0 ? ub.z : (i===1 ? fb.z : hb.z),
                            duration: 0.5, ease: "power2.inOut"
                        });
                    }
                }
                else if (name === 'nod' && head && vrmBaseRotations) {
                    const hb = vrmBaseRotations[VRMHumanBoneName.Head] || vrmBaseRotations[VRMHumanBoneName.Neck];
                    if (hb) {
                        window.isGesturing = true;
                        gsap.to(head.rotation, {
                            x: hb.x - 0.25,
                            duration: 0.15,
                            ease: "sine.inOut",
                            yoyo: true,
                            repeat: 3,
                            onComplete: () => gsap.to(head.rotation, {x: hb.x, duration: 0.2, onComplete: () => window.isGesturing=false})
                        });
                    }
                }
                else if (name === 'shake' && head && vrmBaseRotations) {
                    const hb = vrmBaseRotations[VRMHumanBoneName.Head] || vrmBaseRotations[VRMHumanBoneName.Neck];
                    if (hb) {
                        window.isGesturing = true;
                        gsap.to(head.rotation, {
                            y: hb.y + 0.35,
                            duration: 0.15,
                            ease: "sine.inOut",
                            yoyo: true,
                            repeat: 3,
                            onComplete: () => gsap.to(head.rotation, {y: hb.y, duration: 0.2, onComplete: () => window.isGesturing=false})
                        });
                    }
                }
                else if (name === 'shrug' && torso && lUpper && rUpper && vrmBaseRotations) {
                    const tb = vrmBaseRotations[VRMHumanBoneName.Chest] || vrmBaseRotations[VRMHumanBoneName.Spine];
                    const lub = vrmBaseRotations[VRMHumanBoneName.LeftUpperArm];
                    const rub = vrmBaseRotations[VRMHumanBoneName.RightUpperArm];
                    
                    if (tb && lub && rub) {
                        window.isGesturing = true;
                        const tl = gsap.timeline();
                        tl.eventCallback('onComplete', () => { window.isGesturing = false; });
                        tl.to(torso.rotation, { x: tb.x - 0.15, duration: 0.3, ease: "power1.inOut" }, 0);
                        tl.to(lUpper.rotation, { z: lub.z + 0.4, duration: 0.3, ease: "power1.inOut" }, 0);
                        tl.to(rUpper.rotation, { z: rub.z - 0.4, duration: 0.3, ease: "power1.inOut" }, 0);
                        
                        tl.to([torso.rotation, lUpper.rotation, rUpper.rotation], {
                            x: (i) => i===0 ? tb.x : (i===1 ? lub.x : rub.x),
                            z: (i) => i===0 ? tb.z : (i===1 ? lub.z : rub.z),
                            duration: 0.4, ease: "power1.inOut", delay: 0.5
                        });
                    }
                }

                // We don't use 'activeGesture' variable for standard looped math anymore. 
                // We rely on GSAP tweens overlaid on VRM.
                return;
            }

            if (ev.type === 'expression') {
                const id = ev.id || null;
                if (id && id === lastExpressionId) return;
                lastExpressionId = id;

                const name = String(ev.name || '').toLowerCase();
                if (!name) return;

                const allowed = new Set(['happy', 'sad', 'angry', 'relaxed', 'surprised']);
                if (!allowed.has(name)) return;

                activeExpression = {
                    name,
                    id,
                    value: Math.max(0, Math.min(1, Number(ev.value ?? 0.6))),
                    startS: performance.now() * 0.001,
                    durationS: Math.max(0.6, Number(ev.duration || 1.6))
                };
            }
        }

        const applyVrmRelaxedPose = () => {
            // VRMs often load in a T/A-pose when no animation is applied.
            // Apply a light, generic relaxed pose so it looks natural.
            // If arms still look like a "V", increase RELAX.upperArmZ.
            // If arms clip into the torso, decrease it.
            const RELAX = {
                // radians
                upperArmZ: 1.15,
                upperArmX: -0.15,
                lowerArmZ: 0.20,
                lowerArmX: -0.10,
                handZ: 0.05,
            };
            const lUpper = getVrmBone(VRMHumanBoneName.LeftUpperArm);
            const rUpper = getVrmBone(VRMHumanBoneName.RightUpperArm);
            const lFore = getVrmBone(VRMHumanBoneName.LeftLowerArm);
            const rFore = getVrmBone(VRMHumanBoneName.RightLowerArm);
            const lHand = getVrmBone(VRMHumanBoneName.LeftHand);
            const rHand = getVrmBone(VRMHumanBoneName.RightHand);

            // These offsets are intentionally small-ish and symmetric.
            // Some avatars use different bone orientations; tweak RELAX if needed.
            if (lUpper) {
                lUpper.rotation.z += RELAX.upperArmZ;
                lUpper.rotation.x += RELAX.upperArmX;
            }
            if (rUpper) {
                rUpper.rotation.z += -RELAX.upperArmZ;
                rUpper.rotation.x += RELAX.upperArmX;
            }
            if (lFore) {
                lFore.rotation.z += RELAX.lowerArmZ;
                lFore.rotation.x += RELAX.lowerArmX;
            }
            if (rFore) {
                rFore.rotation.z += -RELAX.lowerArmZ;
                rFore.rotation.x += RELAX.lowerArmX;
            }
            if (lHand) {
                lHand.rotation.z += RELAX.handZ;
            }
            if (rHand) {
                rHand.rotation.z += -RELAX.handZ;
            }

            try { vrm.scene.updateWorldMatrix(true, true); } catch {}
        }
