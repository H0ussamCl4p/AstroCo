server {
    listen 80;
    # Change `your_domain_or_ip` to your Azure DNS name, e.g. astroco.eastus.cloudapp.azure.com
    server_name _; 

    # Path to Vite built frontend
    root /opt/astroco/dist;
    index index.html;

    # Serve static frontend files and models/assets
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy WebSocket to the local Python vr_backend.py
    location /ws {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400; # Keep WS connection alive
    }
}
